name: Auto-Update Claude News

on:
  schedule:
    # Run every Monday and Thursday at 9:00 UTC
    - cron: "0 9 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-updates:
    name: Fetch Latest Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch updates from Anthropic
        run: npx tsx scripts/fetch-updates.ts
      - name: Check for changes
        id: diff
        run: |
          git diff --quiet content/updates.json || echo "changed=true" >> $GITHUB_OUTPUT
      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/updates.json
          git commit -m "content: auto-update Claude news and features"
          git push
